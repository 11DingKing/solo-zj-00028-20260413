version: "1.0"
services:
 db:
  image: mysql:8.0
  container_name: mysql_db
  environment:
   MYSQL_DATABASE: chronicles
   MYSQL_USER: chronicles_user
   MYSQL_PASSWORD: chronicles_pass
   MYSQL_ROOT_PASSWORD: root_pass
  command: --default-authentication-plugin=mysql_native_password
  ports:
   - "3306:3306"
  healthcheck:
   test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
   interval: 10s
   timeout: 5s
   retries: 10

 frontend_app:
  container_name: frontend_app
  image: frontend_app:react 
  build: ./frontend
  ports:
   - "3000:3000"

 backend_api:
  container_name: backend_api
  image: backend_api:django
  build: ./backend
  depends_on:
   db:
    condition: service_healthy
  command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
  ports:
   - "8000:8000"

